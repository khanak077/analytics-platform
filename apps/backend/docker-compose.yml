services:
  postgres:
    image: postgres:16
    container_name: analytics_postgres

    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      POSTGRES_DB: analytics_db

    ports:
      - "5544:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: analytics_redis

    ports:
      - "6379:6379"

volumes:
  postgres_data: